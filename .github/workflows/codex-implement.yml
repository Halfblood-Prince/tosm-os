# .github/workflows/codex-implement.yml
name: Codex Implement Task

on:
  issues:
    types: [labeled]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  codex-implement:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' && github.event.label.name == 'codex')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Create work branch
        id: branch
        run: |
          BRANCH="codex/${{ github.event.issue.number || github.run_id }}"
          git checkout -b "$BRANCH"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Run Codex
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: workspace-write
          safety-strategy: drop-sudo
          prompt: |
            Read README.md, AGENTS.md, docs/status/current.md, and relevant docs first.

            Work only on the active milestone/subtask.
            If the GitHub issue contains task details, treat those as the scoped task.
            Follow repository rules exactly:
            - smallest correct next slice
            - keep the repo buildable and testable
            - create/update docs/plan/<topic>.md for >200 LOC or cross-cutting changes
            - update docs when behavior changes
            - avoid unrelated refactors
            - do not mark milestone complete unless CI passes

            Required local verification before finishing:
            - make fmt
            - make lint
            - make test
            - make build
            - make smoke

            If verification fails, fix the smallest root cause and retry.
            Leave the repository with a reviewable diff.

      - name: Detect changes
        id: detect_changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit changes
        if: steps.detect_changes.outputs.changed == 'true'
        run: |
          git config user.name "codex[bot]"
          git config user.email "codex[bot]@users.noreply.github.com"
          git add .
          git commit -m "codex: implement scoped task"

      - name: Push branch
        if: steps.detect_changes.outputs.changed == 'true'
        run: |
          git push origin "${{ steps.branch.outputs.name }}"

      - name: Open pull request
        if: steps.detect_changes.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const issueNumber = context.payload.issue ? context.payload.issue.number : null;
            const branch = "${{ steps.branch.outputs.name }}";
            const base = context.payload.repository.default_branch;

            const body = [
              issueNumber ? `Closes #${issueNumber}` : "Automated Codex task output.",
              "",
              "Generated by Codex from the scoped repository task.",
              "CI will determine whether this task is actually complete."
            ].join("\n");

            await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: issueNumber
                ? `Codex: implement #${issueNumber}`
                : `Codex: implement task ${context.runId}`,
              head: branch,
              base,
              body
            });

      - name: Comment when no changes were needed
        if: github.event_name == 'issues' && steps.detect_changes.outputs.changed != 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: "Codex did not produce a code change for this scoped task."
            })
