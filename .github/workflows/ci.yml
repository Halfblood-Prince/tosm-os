name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-checks:
    name: Rust checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Tests
        run: cargo test --all --verbose

      - name: Build
        run: cargo build --workspace --verbose

  boot-smoke:
    name: Boot smoke
    runs-on: ubuntu-latest
    needs: rust-checks

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install QEMU and tools
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 ovmf

      - name: Run smoke test
        run: |
          chmod +x ./tools/smoke-test.sh
          ./tools/smoke-test.sh | tee smoke.log

      - name: Upload smoke log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-log
          path: smoke.log

  summary:
    name: CI summary
    runs-on: ubuntu-latest
    needs: [rust-checks, boot-smoke]
    if: always()

    steps:
      - name: Write summary
        run: |
          {
            echo "## CI Result"
            echo ""
            echo "- rust-checks: ${{ needs.rust-checks.result }}"
            echo "- boot-smoke: ${{ needs.boot-smoke.result }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if any dependency failed
        run: |
          test "${{ needs.rust-checks.result }}" = "success"
          test "${{ needs.boot-smoke.result }}" = "success"
