# .github/workflows/codex-autofix.yml
name: Codex Auto-Fix CI

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read

jobs:
  autofix:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout failing branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      - name: Run Codex against failure
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: workspace-write
          safety-strategy: drop-sudo
          prompt: |
            The CI workflow "${{ github.event.workflow_run.name }}" failed.

            Repository rules:
            - read AGENTS.md, README.md, docs/status/current.md first
            - fix only the smallest root cause of the CI failure
            - do not perform unrelated refactors
            - preserve milestone scope
            - rerun the relevant local verification commands:
              - make fmt
              - make lint
              - make test
              - make build
              - make smoke

            Use the failing workflow run metadata:
            - workflow: ${{ github.event.workflow_run.name }}
            - branch: ${{ github.event.workflow_run.head_branch }}
            - sha: ${{ github.event.workflow_run.head_sha }}
            - url: ${{ github.event.workflow_run.html_url }}

            Make the minimal reviewable change.

      - name: Detect changes
        id: detect_changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit autofix
        if: steps.detect_changes.outputs.changed == 'true'
        run: |
          git config user.name "codex[bot]"
          git config user.email "codex[bot]@users.noreply.github.com"
          git add .
          git commit -m "codex: autofix CI failure"

      - name: Push autofix
        if: steps.detect_changes.outputs.changed == 'true'
        run: |
          git push origin HEAD:${{ github.event.workflow_run.head_branch }}
